<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pagina AQI – Versione Professionale (v6.8.4)</title>

<style>
/* (TUTTO IL TUO CSS IDENTICO - NON MODIFICATO) */
:root{--bg:#eef6ee;--card:#ffffff;--primary:#0b3c5d;--muted:#6b7280;--shadow:0 6px 18px rgba(0,0,0,.08);--radius:12px}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:#111827}
header{padding:20px 28px 10px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;align-items:center}
header>div:first-child{text-align:left}
header .filters{margin-left:auto}
header h1{margin:0;font-size:1.7rem;color:var(--primary)}
header p{margin:6px 0 0;font-size:.9rem;color:var(--muted)}
.filters{display:flex;align-items:flex-end;gap:10px;background:var(--card);padding:12px 14px;border-radius:var(--radius);box-shadow:var(--shadow)}
.filters label{font-size:.7rem;color:var(--muted)}
.filters input,.filters select{padding:7px 10px;border-radius:8px;border:1px solid #d1d5db;font-size:.8rem}
.filters button{padding:8px 14px;border-radius:10px;background:#dc2626;color:#fff;border:none;font-weight:600;cursor:pointer}
main{padding:0 28px 40px;max-width:1280px;margin:0 auto}
.kpi-section{border:2px solid #d1d5db;border-radius:12px;padding:12px;margin-bottom:26px}
.kpi-title{margin:0 0 10px;font-size:1.1rem;color:var(--primary)}
.kpi-row{display:grid;grid-template-columns:repeat(7,minmax(159px,1fr));gap:14px}
.kpi{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 10px;text-align:center;aspect-ratio:1/1;display:flex;flex-direction:column;justify-content:center}
.kpi .title{font-size:.95rem;font-weight:700;color:#374151}
.kpi .sensor{font-size:.72rem;color:var(--muted)}
.kpi .value{margin-top:8px;font-size:1.15rem;font-weight:700}
.aqi-badge{margin-top:6px;display:inline-block;padding:4px 10px;border-radius:999px;font-size:.7rem;color:#fff;font-weight:700}
.layout{display:grid;grid-template-columns:280px 1fr;gap:20px}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.panel{background:var(--card);border:2px solid #d1d5db;border-radius:12px;box-shadow:var(--shadow);padding:14px;font-size:.8rem;display:flex;flex-direction:column;gap:8px;align-self:flex-start}
.panel h3,.charts-wrapper h3{margin:0 0 12px;font-size:1rem;font-weight:700;color:var(--primary)}
.charts-wrapper{background:var(--card);border:2px solid #d1d5db;border-radius:12px;box-shadow:var(--shadow);padding:14px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.charts{grid-template-columns:1fr}}
.chart{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px}
iframe{width:100%;height:260px;border:0;border-radius:8px}
canvas{width:100%;height:260px}
footer{text-align:center;margin-top:30px;font-size:.75rem;color:var(--muted)}
</style>

<!-- ✅ AGGIUNTA CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>Air Quality Index Device — AQI_01</h1>
</header>

<main>

<section class="layout">

<div class="charts-wrapper">
<h3>Grafici</h3>

<section class="charts" id="charts"></section>

<!-- ✅ GRAFICO COMBINATO -->
<div class="chart">
<div>
<span class="chart-title">PM2.5 + PM10</span>
</div>
<canvas id="pmCombined"></canvas>
</div>

</div>
</section>

</main>

<script>

const CHANNEL = 2789658;

/* ===== GRAFICO COMBINATO ===== */
async function renderCombinedChart(){
  const r = await fetch(`https://api.thingspeak.com/channels/${CHANNEL}/feeds.json?results=200`);
  const j = await r.json();
  const feeds = j.feeds || [];

  const labels = feeds.map(f =>
    new Date(f.created_at).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})
  );

  const pm25 = feeds.map(f => Number(f.field6));
  const pm10 = feeds.map(f => Number(f.field7));

  const ctx = document.getElementById('pmCombined').getContext('2d');

  if(window.pmChart) window.pmChart.destroy();

  window.pmChart = new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'PM2.5',data:pm25,tension:0.3},
        {label:'PM10',data:pm10,tension:0.3}
      ]
    }
  });
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded',()=>{
  renderCombinedChart();
});

</script>

</body>
</html>
