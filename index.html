<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard AQI - Fix Totale</title>

  <!-- LIBRERIE: Ordine fondamentale per far funzionare l'asse orario -->
  <script src="https://jsdelivr.net"></script>
  <script src="https://jsdelivr.net"></script>

  <style>
    :root{ --bg:#eef6ee; --card:#ffffff; --primary:#0b3c5d; --muted:#6b7280; --shadow:0 6px 18px rgba(0,0,0,.08); --radius:12px }
    *{box-sizing:border-box}
    body{ margin:0; font-family:sans-serif; background:var(--bg); color:#111827; padding:20px }
    header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px }
    .filters{ display:flex; gap:10px; background:var(--card); padding:10px; border-radius:var(--radius); box-shadow:var(--shadow); align-items:center }
    .kpi-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:15px; margin-bottom:20px }
    .kpi{ background:var(--card); padding:15px; border-radius:var(--radius); text-align:center; box-shadow:var(--shadow) }
    .kpi .title{ font-weight:bold; font-size:0.9rem; color:var(--muted) }
    .kpi .value{ font-size:1.4rem; font-weight:bold; margin:10px 0; color:var(--primary) }
    .layout{ display:grid; grid-template-columns:250px 1fr; gap:20px }
    .panel{ background:var(--card); padding:15px; border-radius:var(--radius); box-shadow:var(--shadow); height:fit-content }
    .charts{ display:grid; grid-template-columns:1fr 1fr; gap:20px }
    .chart{ background:var(--card); padding:10px; border-radius:var(--radius); box-shadow:var(--shadow); height:300px }
    @media(max-width:900px){ .layout, .charts{grid-template-columns:1fr} }
    button{ background:#dc2626; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold }
  </style>
</head>
<body>

<header>
  <h1>AQI Monitor — AQI_01</h1>
  <div class="filters">
    <select id="viewMode">
      <option value="live">Ultime 24 ore</option>
      <option value="range">Range Date</option>
    </select>
    <input type="date" id="start">
    <input type="date" id="end">
    <button id="update">AGGIORNA</button>
  </div>
</header>

<div class="kpi-row">
  <div class="kpi"><div class="title">Umidità</div><div class="value" id="hum">-- %</div></div>
  <div class="kpi"><div class="title">Temperatura</div><div class="value" id="temp">-- °C</div></div>
  <div class="kpi"><div class="title">Pressione</div><div class="value" id="press">-- hPa</div></div>
  <div class="kpi"><div class="title">PM2.5 (24h)</div><div class="value" id="pm25">-- µg/m³</div></div>
  <div class="kpi"><div class="title">PM10 (24h)</div><div class="value" id="pm10">-- µg/m³</div></div>
</div>

<div class="layout">
  <aside class="panel">
    <h3>Grafici</h3>
    <label style="display:block"><input type="checkbox" checked data-id="1"> Umidità</label>
    <label style="display:block"><input type="checkbox" checked data-id="2"> Temperatura</label>
    <label style="display:block"><input type="checkbox" checked data-id="6"> PM2.5</label>
    <label style="display:block"><input type="checkbox" checked data-id="7"> PM10</label>
  </aside>
  <div class="charts" id="charts"></div>
</div>

<script>
const CHANNEL = 2789658;

/* =========================
   VERSIONE DEFINITIVA FIX DATA & URL
   ========================= */

async function fetchData() {
  const vMode = document.getElementById('viewMode').value;
  const now = new Date();
  let start, end;

  if (vMode === "live") {
    end = now;
    start = new Date(now.getTime() - 24 * 60 * 60 * 1000);
  } else {
    // Gestione sicura delle date dai campi input
    const sVal = document.getElementById('start').value || new Date().toISOString().slice(0,10);
    const eVal = document.getElementById('end').value || new Date().toISOString().slice(0,10);
    start = new Date(sVal + 'T00:00:00');
    end = new Date(eVal + 'T23:59:59');
  }

  // 🔥 FIX CRITICO: Formattazione data precisa per ThingSpeak (YYYY-MM-DD%20HH:NN:SS)
  const toTS = (d) => d.toISOString().replace('T', '%20').slice(0, 19);
  const sStr = toTS(start);
  const eStr = toTS(end);

  try {
    // 1. CARICAMENTO KPI
    const rKPI = await fetch(`https://thingspeak.com{CHANNEL}/feeds.json?start=${sStr}&end=${eStr}`);
    const jKPI = await rKPI.json();
    
    if (jKPI.feeds && jKPI.feeds.length > 0) {
      const last = jKPI.feeds[jKPI.feeds.length - 1];
      document.getElementById('hum').innerText = (last.field1 ? Number(last.field1).toFixed(1) : '--') + ' %';
      document.getElementById('temp').innerText = (last.field2 ? Number(last.field2).toFixed(1) : '--') + ' °C';
      document.getElementById('press').innerText = (last.field3 ? Number(last.field3).toFixed(1) : '--') + ' hPa';
      
      const avg = f => (jKPI.feeds.reduce((s, x) => s + Number(x[f] || 0), 0) / jKPI.feeds.length).toFixed(1);
      document.getElementById('pm25').innerText = avg('field6') + ' µg/m³';
      document.getElementById('pm10').innerText = avg('field7') + ' µg/m³';
    }

    // 2. CARICAMENTO GRAFICI
    const container = document.getElementById('charts');
    container.innerHTML = '';
    const selected = document.querySelectorAll('aside input[data-id]:checked');

    for (const ch of selected) {
      const id = ch.dataset.id;
      if (id === "combo") continue; // Gestiremo il combinato dopo

      const chartDiv = document.createElement('div');
      chartDiv.className = 'chart';
      chartDiv.innerHTML = `<canvas id="c_${id}"></canvas>`;
      container.appendChild(chartDiv);

      // Fetch specifica per il campo con URL CORRETTO
      const rField = await fetch(`https://thingspeak.com{CHANNEL}/fields/${id}.json?start=${sStr}&end=${eStr}`);
      const jField = await rField.json();

      new Chart(document.getElementById(`c_${id}`), {
        type: 'line',
        data: {
          labels: jField.feeds.map(f => new Date(f.created_at)),
          datasets: [{
            label: ch.parentElement.innerText.trim(),
            data: jField.feeds.map(f => f[`field${id}`]),
            borderColor: '#dc2626',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
            tension: 0.3
          }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          scales: { 
            x: { 
              type: 'time', 
              time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
              grid: { display: true }
            },
            y: { beginAtZero: false }
          },
          plugins: { legend: { display: false } }
        }
      });
    }
  } catch (e) {
    console.error("Errore caricamento:", e);
  }
}

// Aggiorna l'evento click e l'avvio
document.getElementById('update').onclick = fetchData;
window.onload = fetchData;

</script>

</body>
</html>
